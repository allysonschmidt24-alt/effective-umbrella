<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Quicksand';
  background:linear-gradient(#e8efe8,#f6f3ec);
  overflow-x:hidden;
}

/* 🌿 SCENE BACKGROUND */
.scene{
  position:fixed;
  inset:0;
  z-index:-2;
  overflow:hidden;
}

/* sky gradient */
.sky{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(#dfeee4,#f6f3ec);
}

/* hills */
.hill{
  position:absolute;
  bottom:-50px;
  width:120%;
  height:200px;
  background:#dce8dc;
  border-radius:50%;
  left:-10%;
}
.hill2{
  background:#cfe0cf;
  bottom:-80px;
}

/* cozy window */
.window{
  position:absolute;
  top:40px;
  left:40px;
  width:140px;
  height:140px;
  border:6px solid #d8cbb5;
  border-radius:20px;
  background:rgba(255,255,255,0.3);
  backdrop-filter:blur(6px);
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
.window::before{
  content:"";
  position:absolute;
  width:100%;
  height:2px;
  top:50%;
  background:#d8cbb5;
}
.window::after{
  content:"";
  position:absolute;
  height:100%;
  width:2px;
  left:50%;
  background:#d8cbb5;
}

/* layout */
.container{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:20px;
  padding:20px;
}

.panel{
  background:rgba(255,255,255,0.8);
  border-radius:25px;
  padding:20px;
  backdrop-filter:blur(12px);
}

/* tabs */
.tabs{text-align:center;padding:10px;}
.tab{
  display:inline-block;
  margin:5px;
  padding:6px 12px;
  border-radius:12px;
  cursor:pointer;
}
.tab.active{
  background:#7aa87a;
  color:white;
}

/* calendar */
.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
}
.day{
  width:34px;height:34px;
  border-radius:50%;
  border:2px solid #7aa87a;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.day.checked{
  background:#7aa87a;color:white;
  box-shadow:0 0 10px #7aa87a;
}

/* vinyl */
.vinyl{
  width:70px;height:70px;background:black;
  border-radius:50%;display:inline-flex;
  align-items:center;justify-content:center;
  margin:6px;position:relative;
}
.vinyl:hover{animation:spin 2s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.vinyl::after{
  content:"";width:22px;height:22px;
  background:#e6c79c;border-radius:50%;
}
.vinyl input{
  position:absolute;width:60px;
  text-align:center;font-size:10px;
  border:none;background:transparent;color:white;
}

/* bookshelf */
.book{
  display:inline-block;margin:2px;
  background:#d8c3a5;
  writing-mode:vertical-rl;
  font-size:9px;padding:2px;
}
.book:nth-child(odd){height:70px;width:18px;}
.book:nth-child(even){height:85px;width:22px;}

/* mood */
.mood-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;margin-top:10px;
}
.mood-day{
  width:20px;height:20px;
  border-radius:6px;background:#eee;
  cursor:pointer;
}
.mood1{background:#d6e4ff;}
.mood2{background:#cfe8d5;}
.mood3{background:#f3f0e6;}
.mood4{background:#ffe5b4;}
.mood5{background:#ffd6a5;}

/* swatches */
.mood-key{margin-top:12px;font-size:12px;opacity:0.85;}
.mood-key div{display:flex;align-items:center;gap:8px;margin:4px 0;}
.key-swatch{
  width:18px;height:18px;
  border-radius:50% 60% 55% 65%;
  box-shadow:0 0 6px rgba(0,0,0,0.08);
  animation:breathe 6s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.08);}
}
.swatch1{background:radial-gradient(#e8f0ff,#cddfff);}
.swatch2{background:radial-gradient(#e3f2e8,#cfe8d5);}
.swatch3{background:radial-gradient(#faf7ef,#f3f0e6);}
.swatch4{background:radial-gradient(#fff1d6,#ffe5b4);}
.swatch5{background:radial-gradient(#ffe4cc,#ffd6a5);}

/* insight */
#insight{margin-top:15px;font-style:italic;opacity:0.7;}

h3{font-family:'Playfair Display';}

/* 🌿 animations */
@keyframes fall{to{transform:translateY(110vh);}}
@keyframes drift{to{transform:translateY(110vh) translateX(40px) rotate(120deg);}}
@keyframes leafFall{to{transform:translateY(110vh) translateX(60px) rotate(200deg);}}
@keyframes floatGlow{
  0%{opacity:0;}
  50%{opacity:1;}
  100%{transform:translateY(-120px);opacity:0;}
}
</style>
</head>

<body>

<div class="scene">
  <div class="sky"></div>
  <div class="hill"></div>
  <div class="hill hill2"></div>
  <div class="window"></div>
</div>

<div id="effects"></div>
<div class="tabs" id="tabs"></div>

<div class="container">

<div class="panel">
<h3>Listening To:</h3>
<div id="vinyls"></div>

<h3>Bookshelf</h3>
<div id="books"></div>

<h3>Energy</h3>
<div class="mood-grid" id="moods"></div>

<div class="mood-key">
<div><span class="key-swatch swatch1"></span> deep rest needed</div>
<div><span class="key-swatch swatch2"></span> moving gently</div>
<div><span class="key-swatch swatch3"></span> baseline</div>
<div><span class="key-swatch swatch4"></span> a bit of lift</div>
<div><span class="key-swatch swatch5"></span> lots of energy available</div>
</div>

</div>

<div class="panel">
<h2 id="monthTitle"></h2>
<div class="grid" id="grid"></div>
<p id="insight"></p>
</div>

</div>

<script>
const months=["April","May","June","July","August","September","October","November","December"];
let currentMonth=0;

/* tabs */
const tabs=document.getElementById("tabs");
months.forEach((m,i)=>{
  let t=document.createElement("span");
  t.className="tab";
  t.innerText=m;
  t.onclick=()=>{currentMonth=i;render();};
  tabs.appendChild(t);
});

/* 🌿 seasonal effects */
function setEffects(month){
  const e=document.getElementById("effects");
  e.innerHTML="";

  function spawn(html,count){
    for(let i=0;i<count;i++){
      let wrap=document.createElement("div");
      wrap.innerHTML=html;
      let el=wrap.firstChild;
      el.style.position="fixed";
      el.style.left=Math.random()*100+"vw";
      el.style.top="-20px";
      el.style.animationDuration=(3+Math.random()*4)+"s";
      el.style.pointerEvents="none";
      e.appendChild(el);
    }
  }

  if(month==="April"){
    spawn(`<div style="width:2px;height:12px;background:#9dbbd6;animation:fall linear infinite;"></div>`,40);
  }

  if(month==="May"){
    spawn(`<div style="width:8px;height:8px;background:#f5c6d6;border-radius:60% 40%;animation:drift linear infinite;"></div>`,25);
  }

  if(["June","July","August"].includes(month)){
    spawn(`<div style="width:4px;height:4px;background:#fff4a3;border-radius:50%;box-shadow:0 0 10px #fff4a3;animation:floatGlow 6s infinite;"></div>`,20);
  }

  if(["September","October"].includes(month)){
    spawn(`<svg width="10" height="10" viewBox="0 0 24 24" fill="#b8895e" style="animation:drift linear infinite;"><path d="M12 2C8 8 6 12 12 22C18 12 16 8 12 2Z"/></svg>`,20);
  }

  if(month==="November"){
    const colors=["#d27d2d","#c94c4c","#e0ac69"];
    for(let i=0;i<25;i++){
      let leaf=document.createElement("div");
      leaf.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="${colors[Math.floor(Math.random()*3)]}">
      <path d="M12 2C7 10 5 14 12 22C19 14 17 10 12 2Z"/></svg>`;
      let el=leaf.firstChild;
      el.style.position="fixed";
      el.style.left=Math.random()*100+"vw";
      el.style.top="-20px";
      el.style.animation="leafFall "+(4+Math.random()*4)+"s linear infinite";
      e.appendChild(el);
    }
  }

  if(month==="December"){
    spawn(`<div style="width:6px;height:6px;background:white;border-radius:50%;animation:fall linear infinite;"></div>`,30);
  }
}

/* render stays same */
function render(){

document.querySelectorAll(".tab").forEach((t,i)=>{
  t.classList.toggle("active",i===currentMonth);
});

document.getElementById("monthTitle").innerText=months[currentMonth];

const grid=document.getElementById("grid");
grid.innerHTML="";

for(let i=1;i<=30;i++){
  let d=document.createElement("div");
  d.className="day";
  d.innerText=i;

  let key=currentMonth+"-"+i;
  if(localStorage.getItem(key)==="true") d.classList.add("checked");

  d.onclick=()=>{
    d.classList.toggle("checked");
    localStorage.setItem(key,d.classList.contains("checked"));
    render();
  };

  grid.appendChild(d);
}

setEffects(months[currentMonth]);
}

render();
</script>

</body>
</html>
