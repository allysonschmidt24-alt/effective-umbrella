<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Quicksand';
  background:linear-gradient(#e8efe8,#f6f3ec);
  overflow-x:hidden;
}

/* 🌿 background scene */
.scene{
  position:fixed;
  inset:0;
  z-index:-2;
}
.sky{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(#dfeee4,#f6f3ec);
}
.hill{
  position:absolute;
  bottom:-50px;
  width:120%;
  height:200px;
  background:#dce8dc;
  border-radius:50%;
  left:-10%;
}
.hill2{
  background:#cfe0cf;
  bottom:-80px;
}

/* layout */
.container{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:20px;
  padding:20px;
}

.panel{
  background:rgba(255,255,255,0.8);
  border-radius:25px;
  padding:20px;
  backdrop-filter:blur(12px);
}

/* tabs */
.tabs{text-align:center;padding:10px;}
.tab{
  display:inline-block;
  margin:5px;
  padding:6px 12px;
  border-radius:12px;
  cursor:pointer;
}
.tab.active{
  background:#7aa87a;
  color:white;
}

/* calendar */
.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
}
.day{
  width:34px;height:34px;
  border-radius:50%;
  border:2px solid #7aa87a;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.day.checked{
  background:#7aa87a;color:white;
}

/* vinyl */
.vinyl{
  width:70px;height:70px;background:black;
  border-radius:50%;display:inline-flex;
  align-items:center;justify-content:center;
  margin:6px;position:relative;
}
.vinyl:hover{animation:spin 2s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.vinyl::after{
  content:"";width:22px;height:22px;
  background:#e6c79c;border-radius:50%;
}
.vinyl input{
  position:absolute;width:60px;
  text-align:center;font-size:10px;
  border:none;background:transparent;color:white;
}

/* bookshelf */
.book{
  display:inline-block;margin:2px;
  background:#d8c3a5;
  writing-mode:vertical-rl;
  font-size:9px;padding:2px;
}
.book:nth-child(odd){height:70px;width:18px;}
.book:nth-child(even){height:85px;width:22px;}

/* mood */
.mood-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;margin-top:10px;
}
.mood-day{
  width:20px;height:20px;
  border-radius:6px;background:#eee;
  cursor:pointer;
}
.mood1{background:#d6e4ff;}
.mood2{background:#cfe8d5;}
.mood3{background:#f3f0e6;}
.mood4{background:#ffe5b4;}
.mood5{background:#ffd6a5;}

/* swatches */
.mood-key{margin-top:12px;font-size:12px;}
.mood-key div{display:flex;align-items:center;gap:8px;margin:4px 0;}
.key-swatch{
  width:18px;height:18px;
  border-radius:50% 60% 55% 65%;
  box-shadow:0 0 6px rgba(0,0,0,0.08);
}
.swatch1{background:#cddfff;}
.swatch2{background:#cfe8d5;}
.swatch3{background:#f3f0e6;}
.swatch4{background:#ffe5b4;}
.swatch5{background:#ffd6a5;}

/* animations */
@keyframes fall{to{transform:translateY(110vh);}}
@keyframes fallSlow{to{transform:translateY(110vh);opacity:0.8;}}
@keyframes drift{to{transform:translateY(110vh) translateX(40px) rotate(120deg);}}
@keyframes leafFall{to{transform:translateY(110vh) translateX(60px) rotate(200deg);}}
@keyframes floatGlow{
  0%{opacity:0;}
  50%{opacity:1;}
  100%{transform:translateY(-120px);opacity:0;}
}
</style>
</head>

<body>

<div class="scene">
  <div class="sky"></div>
  <div class="hill"></div>
  <div class="hill hill2"></div>
</div>

<div id="effects"></div>
<div class="tabs" id="tabs"></div>

<div class="container">

<div class="panel">
<h3>Listening To:</h3>
<div id="vinyls"></div>

<h3>Bookshelf</h3>
<div id="books"></div>

<h3>Energy</h3>
<div class="mood-grid" id="moods"></div>

<div class="mood-key">
<div><span class="key-swatch swatch1"></span> deep rest needed</div>
<div><span class="key-swatch swatch2"></span> moving gently</div>
<div><span class="key-swatch swatch3"></span> baseline</div>
<div><span class="key-swatch swatch4"></span> a bit of lift</div>
<div><span class="key-swatch swatch5"></span> lots of energy available</div>
</div>

</div>

<div class="panel">
<h2 id="monthTitle"></h2>
<div class="grid" id="grid"></div>
<p id="insight"></p>
</div>

</div>

<script>
const months=["April","May","June","July","August","September","October","November","December"];
let currentMonth=0;

/* tabs */
const tabs=document.getElementById("tabs");
months.forEach((m,i)=>{
  let t=document.createElement("span");
  t.className="tab";
  t.innerText=m;
  t.onclick=()=>{currentMonth=i;render();};
  tabs.appendChild(t);
});

/* ✅ YOUR EXACT EFFECTS FUNCTION */
function setEffects(month){
  const e=document.getElementById("effects");
  e.innerHTML="";

  function createParticle(html, count){
    for(let i=0;i<count;i++){
      let el=document.createElement("div");
      el.innerHTML = html;
      let node = el.firstChild;

      node.style.position="fixed";
      node.style.left=Math.random()*100+"vw";
      node.style.top="-20px";
      node.style.pointerEvents="none";

      node.style.animationDuration = (3 + Math.random()*5)+"s";
      node.style.animationDelay = Math.random()*3+"s";

      e.appendChild(node);
    }
  }

  if(month==="April"){
    createParticle(`<div style="width:2px;height:12px;background:#9dbbd6;animation:fall linear infinite;"></div>`,40);
  }

  if(month==="May"){
    createParticle(`<div style="width:8px;height:8px;background:#f5c6d6;border-radius:60% 40%;animation:drift linear infinite;"></div>`,25);
  }

  if(["June","July","August"].includes(month)){
    createParticle(`<div style="width:4px;height:4px;background:#fff4a3;border-radius:50%;box-shadow:0 0 10px #fff4a3;animation:floatGlow 6s infinite;"></div>`,20);
  }

  if(["September","October"].includes(month)){
    createParticle(`<svg width="10" height="10" viewBox="0 0 24 24" style="animation:drift linear infinite; fill:#b8895e;"><path d="M12 2C8 8 6 12 12 22C18 12 16 8 12 2Z"/></svg>`,20);
  }

  if(month==="November"){
    const colors=["#d27d2d","#c94c4c","#e0ac69"];
    for(let i=0;i<25;i++){
      let leaf=document.createElement("div");
      leaf.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="${colors[Math.floor(Math.random()*3)]}">
      <path d="M12 2C7 10 5 14 12 22C19 14 17 10 12 2Z"/></svg>`;
      let node=leaf.firstChild;
      node.style.position="fixed";
      node.style.left=Math.random()*100+"vw";
      node.style.top="-20px";
      node.style.animation="leafFall "+(4+Math.random()*4)+"s linear infinite";
      node.style.pointerEvents="none";
      e.appendChild(node);
    }
  }

  if(month==="December"){
    createParticle(`<div style="width:6px;height:6px;background:white;border-radius:50%;animation:fallSlow linear infinite;"></div>`,30);
  }
}

/* render (FULL, not broken) */
function render(){

document.querySelectorAll(".tab").forEach((t,i)=>{
  t.classList.toggle("active",i===currentMonth);
});

document.getElementById("monthTitle").innerText=months[currentMonth];

/* calendar */
const grid=document.getElementById("grid");
grid.innerHTML="";

let outsideDays=0;

for(let i=1;i<=30;i++){
  let d=document.createElement("div");
  d.className="day";
  d.innerText=i;

  let key=currentMonth+"-"+i;

  if(localStorage.getItem(key)==="true"){
    d.classList.add("checked");
    outsideDays++;
  }

  d.onclick=()=>{
    d.classList.toggle("checked");
    localStorage.setItem(key,d.classList.contains("checked"));
    render();
  };

  grid.appendChild(d);
}

/* ✅ VINYLS BACK */
const vinyls=document.getElementById("vinyls");
vinyls.innerHTML="";
for(let i=0;i<5;i++){
  let v=document.createElement("div");
  v.className="vinyl";

  let input=document.createElement("input");
  input.value=localStorage.getItem("song-"+i)||"";
  input.oninput=()=>localStorage.setItem("song-"+i,input.value);

  v.appendChild(input);
  vinyls.appendChild(v);
}

/* ✅ BOOKS BACK */
const books=document.getElementById("books");
books.innerHTML="";
for(let i=0;i<10;i++){
  let b=document.createElement("div");
  b.className="book";
  b.contentEditable=true;
  b.innerText=localStorage.getItem("book-"+i)||"";
  b.oninput=()=>localStorage.setItem("book-"+i,b.innerText);
  books.appendChild(b);
}

/* mood */
const moods=document.getElementById("moods");
moods.innerHTML="";

for(let i=0;i<30;i++){
  let m=document.createElement("div");
  m.className="mood-day";

  let val=parseInt(localStorage.getItem("mood-"+currentMonth+"-"+i))||0;
  if(val) m.classList.add("mood"+val);

  m.onclick=()=>{
    val=(val+1)%6;
    localStorage.setItem("mood-"+currentMonth+"-"+i,val);
    render();
  };

  moods.appendChild(m);
}

setEffects(months[currentMonth]);
}

render();
</script>

</body>
</html>
